<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ler PDF — Hipótese, Contraste, Generalização e Contra-Exemplo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1A1A1A; color: #D0CEC8; height: 100vh; display: flex; flex-direction: column; }
    .pdf-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      gap: 1rem;
    }
    .pdf-toolbar-title {
      font-size: 0.88rem;
      color: #9A9690;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pdf-toolbar-title strong {
      color: #E0DDD8;
    }
    .pdf-toolbar-actions {
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .pdf-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.9rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      border: 1.5px solid #B8860B;
      color: #B8860B;
      background: none;
    }
    .pdf-btn:hover {
      background-color: #B8860B;
      color: #1A1A1A;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
    .pdf-fallback {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    .pdf-fallback p { color: #9A9690; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="pdf-toolbar">
    <span class="pdf-toolbar-title"><strong>Hipótese, Contraste, Generalização e Contra-Exemplo</strong> — Leonel Garcia-Marques</span>
    <div class="pdf-toolbar-actions">
      <a href="HCGCE.pdf" download class="pdf-btn">&#8595; Baixar PDF</a>
      <a href="index.html" class="pdf-btn">&#8592; Voltar</a>
    </div>
  </div>
  <iframe src="HCGCE.pdf" title="Hipótese, Contraste, Generalização e Contra-Exemplo" id="pdf-frame"></iframe>
  <div class="pdf-fallback" id="pdf-fallback">
    <p>O seu browser não consegue mostrar o PDF diretamente.</p>
    <a href="HCGCE.pdf" download class="pdf-btn">&#8595; Baixar PDF</a>
  </div>
  <script>
    var frame = document.getElementById('pdf-frame');
    frame.onerror = function () {
      frame.style.display = 'none';
      document.getElementById('pdf-fallback').style.display = 'flex';
    };
  </script>
</body>
</html>
